name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run repo checks
        run: bash tools/check-repo.sh

  bus-simulator:
    name: Bus-Simulator (M1) self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: KNXnet/IP tunneling handshake self-test
        run: python selftest.py
        working-directory: tools/bus-simulator

  build:
    name: Typecheck, lint & unit tests (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - name: UI bauen (ADR-0013)
        run: pnpm --filter @fachwerk/ui build

  container:
    name: Container build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build stack (fachwerk + bus-simulator)
        run: docker compose build
      - name: Smoke test (version)
        run: docker compose run --rm fachwerk version
      - name: Smoke test (validate Beispiel-Gewerk via Volume)
        run: docker compose run --rm fachwerk validate /gewerke/minimal

  sim:
    name: E2E Walking Skeleton (vs Bus-Simulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Injektion 1/0/1 ⇒ Kaskade ⇒ Telegramm 1/0/2
        run: bash tools/e2e-skeleton.sh
      - name: Neustart-Regel T-5 (Treppenlicht überlebt Container-Restart)
        run: bash tools/e2e-neustart.sh
      - name: Abnahme „Licht Status" (importierte EDOMI-Logik vs Bus)
        run: bash tools/e2e-licht-status.sh
      - name: Beobachtungsmodus (empfängt, sendet garantiert nie)
        run: bash tools/e2e-beobachtung.sh
      - name: MQTT-Rundlauf (echter Mosquitto → Logik → Mosquitto)
        run: bash tools/e2e-mqtt.sh
      - name: API + WebSocket (Status, Werte, Traces, Live, UI)
        run: bash tools/e2e-api.sh
      - name: Archive (Wertänderung wird aufgezeichnet, überlebt Neustart)
        run: bash tools/e2e-archiv.sh
      - name: Schreibpfad (Token, protected, Beobachtungsmodus, Audit)
        run: bash tools/e2e-schreiben.sh
      - name: Gewerk-Reload (Timer überlebt, kaputtes Gewerk wird abgelehnt)
        run: bash tools/e2e-reload.sh
      - name: Auth & Scopes (Login, Cookie, Scope-Grenzen, Rate-Limit, Audit)
        run: bash tools/e2e-auth.sh
