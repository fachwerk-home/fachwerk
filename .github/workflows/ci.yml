name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run repo checks
        run: bash tools/check-repo.sh

  bus-simulator:
    name: Bus-Simulator (M1) self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: KNXnet/IP tunneling handshake self-test
        run: python selftest.py
        working-directory: tools/bus-simulator

  build:
    name: Typecheck, lint & unit tests (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  container:
    name: Container build & smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build stack (fachwerk + bus-simulator)
        run: docker compose build
      - name: Smoke test (version)
        run: docker compose run --rm fachwerk version
      - name: Smoke test (validate Beispiel-Gewerk via Volume)
        run: docker compose run --rm fachwerk validate /gewerke/minimal

  # Placeholder — activated as soon as the respective phase delivers code.
  # sim: logic acceptance tests vs KNX simulator (S-6 / Phase 4)
