name: Image

# Baut das Laufzeit-Image und veroeffentlicht es in der GitHub Container Registry
# (ghcr.io). Portainer & Co. koennen es dann einfach ziehen statt selbst zu bauen.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-push:
    name: Build & push (ghcr.io)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Buildx-Container-Treiber: noetig fuer den GHA-Cache-Export.
      - name: Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei ghcr.io anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags/Labels ableiten
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Bauen & pushen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
