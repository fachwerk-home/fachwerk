# Fachwerk am ECHTEN Bus (Beobachtungsmodus) — zieht das FERTIGE Image aus
# ghcr.io, baut nichts. Fuer Portainer: Stack -> Web editor, diesen Inhalt
# einfuegen, FACHWERK_KNX_HOST setzen, deployen.
#
# Das Image ist oeffentlich ziehbar — keine Registry-Anmeldung noetig.
services:
  fachwerk:
    image: ghcr.io/fachwerk-home/fachwerk:latest
    pull_policy: always
    network_mode: host
    command: ["run", "/gewerk"]
    restart: unless-stopped
    environment:
      # PFLICHT: IP deines KNXnet/IP-Routers.
      FACHWERK_KNX_HOST: ${FACHWERK_KNX_HOST:?bitte FACHWERK_KNX_HOST setzen}
      FACHWERK_KNX_PORT: ${FACHWERK_KNX_PORT:-3671}
      # Sicherheitsnetz: empfangen ja, senden NIE.
      FACHWERK_KNX_MODUS: beobachten
      FACHWERK_DATEN_DIR: /daten
    volumes:
      # Gewerk-Verzeichnis auf dem Host (muss dort liegen — das Image bringt
      # keine Gewerke mit; Gewerk = Daten, nicht Image-Inhalt).
      - ${FACHWERK_GEWERK_DIR:?bitte FACHWERK_GEWERK_DIR auf ein Gewerk-Verzeichnis setzen}:/gewerk:ro
      - fachwerk-daten:/daten

volumes:
  fachwerk-daten:
