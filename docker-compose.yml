# Fachwerk + Bus-Simulator als Stack (SPEC-008).
# Lokal wie in CI: `docker compose build && docker compose run --rm fachwerk`.
# Ab S-6 fährt `fachwerk run` hier den End-zu-End-Akzeptanztest.
services:
  bus-simulator:
    build: ./tools/bus-simulator
    # KNXnet/IP-Tunneling (UDP 3671) + Steuerkanal (UDP 3672) im Compose-Netz.

  fachwerk:
    build: .
    command: ["run", "${FACHWERK_GEWERK:-/gewerke/minimal}"]
    depends_on:
      - bus-simulator
    environment:
      FACHWERK_KNX_HOST: bus-simulator
      FACHWERK_KNX_PORT: "3671"
      FACHWERK_DATEN_DIR: /daten
      # Beobachtungsmodus vom Host durchreichen (leer = normal senden).
      FACHWERK_KNX_MODUS: ${FACHWERK_KNX_MODUS:-}
      FACHWERK_HTTP_PORT: "8300"
      # Schreibpfad (P5-8): leer = API bleibt lesend. Nie ein echtes Token
      # hier eintragen — immer vom Host durchreichen.
      FACHWERK_API_TOKEN: ${FACHWERK_API_TOKEN:-}
      # Scopes des statischen Tokens (P5-12). Default bewusst knapp:
      # read,operate — Gewerk aendern/aktivieren muss man ausdruecklich geben.
      FACHWERK_API_TOKEN_SCOPES: ${FACHWERK_API_TOKEN_SCOPES:-read,operate}
      FACHWERK_API_SCHREIBLIMIT: ${FACHWERK_API_SCHREIBLIMIT:-30}
    ports:
      # API + UI (P5-2/P5-3) auf dem Host erreichbar.
      - "8300:8300"
    volumes:
      # Gewerk ist Daten, nicht Image-Inhalt: kommt immer per Volume.
      - ./examples:/gewerke:ro
      # Laufzeitzustand (SQLite) überlebt Container-Neustarts (ADR-0006).
      - daten:/daten

volumes:
  daten:
