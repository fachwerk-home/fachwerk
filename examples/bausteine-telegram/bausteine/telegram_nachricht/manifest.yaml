id: telegram_nachricht
name: Telegram Nachricht
version: 1
beschreibung: "Sendet eine Nachricht an einen Telegram-Chat über ctx.netz.hole (ADR-0014 V-2). Die Ausgänge gesendet/fehler werden gesetzt, sobald die Antwort des Dienstes eintrifft — als eigene Kaskade, nicht im selben Durchlauf."
eingaenge: [ausloeser, wert]
ausgaenge: [gesendet, fehler]
parameter:
  bot_token: ""
  chat_id: ""
  text: "{wert}"
  nur_bei: null
  api_basis: "https://api.telegram.org"
capabilities:
  netz:
    hosts: [api.telegram.org]
tests:
  # Ohne Token/Chat-ID kommt der Baustein gar nicht bis zum Versand — das ist
  # der einzige Pfad, der ohne Netz deterministisch prüfbar ist.
  - eingaenge: { ausloeser: true, wert: "Test" }
    parameter: { text: "Nachricht: {wert}" }
    erwartet: { gesendet: false, fehler: "Token oder Chat-ID fehlt" }
  # nur_bei filtert: Wert passt nicht, also keine Ausgabe.
  - eingaenge: { ausloeser: true, wert: false }
    parameter: { nur_bei: true }
    erwartet: null
  # Auslöser false ⇒ nichts tun.
  - eingaenge: { ausloeser: false, wert: "egal" }
    erwartet: null
