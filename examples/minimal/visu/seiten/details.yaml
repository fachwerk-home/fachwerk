typ: popup
name: Details
basis: tablet
groessen:
  tablet: { w: 600, h: 360 }
  handy: { w: 350, h: 520 }
elemente:
  titel:
    preset: label
    design: akzent
    placements:
      tablet: { x: 40, y: 40, w: 520, h: 70 }
      handy: { x: 20, y: 50, w: 310, h: 70 }
  aktueller_zaehler:
    preset: wertanzeige
    bindungen:
      display: wohnen.zaehler
    format:
      template: "Aktuell: {fixed(#,0)}"
    design: standard
    placements:
      tablet: { x: 40, y: 140, w: 250, h: 100 }
      handy: { x: 20, y: 150, w: 310, h: 100 }
  licht:
    preset: statusanzeige
    bindungen:
      status: wohnen.licht
    design: standard
    design_je_wert:
      - wenn: true
        design: aktiv
    placements:
      tablet: { x: 310, y: 140, w: 250, h: 100 }
      handy: { x: 20, y: 280, w: 310, h: 100 }
