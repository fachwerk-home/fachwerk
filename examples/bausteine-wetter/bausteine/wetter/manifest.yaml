id: wetter
name: Wetter (Open-Meteo)
version: 1
beschreibung: Holt Wetterdaten und Vorhersagen von Open-Meteo zyklisch oder bei Abruf.
eingaenge: [abruf]
ausgaenge:
  - temperatur
  - gefuehlt
  - luftfeuchte
  - wind_kmh
  - windrichtung
  - niederschlag_mm
  - wettercode
  - ist_tag
  - fehler
  - stand
parameter:
  breite: 52.52
  laenge: 13.41
  intervall_min: 30
  tage: 3
capabilities:
  netz:
    hosts: [api.open-meteo.com]
  timer: true
tests:
  - eingaenge: { abruf: true }
    parameter: { _test_json: "{\"current\":{\"time\":1700000000,\"temperature_2m\":15.5,\"apparent_temperature\":14.2,\"relative_humidity_2m\":65,\"precipitation\":0.0,\"weather_code\":1,\"wind_speed_10m\":12.3,\"wind_direction_10m\":180,\"is_day\":1},\"daily\":{\"time\":[1700000000,1700086400,1700172800],\"weather_code\":[1,2,3],\"temperature_2m_max\":[20.0,22.0,21.0],\"temperature_2m_min\":[10.0,12.0,11.0],\"precipitation_sum\":[0.0,1.5,0.0]}}" }
    erwartet:
      temperatur: 15.5
      gefuehlt: 14.2
      luftfeuchte: 65
      wind_kmh: 12.3
      windrichtung: 180
      niederschlag_mm: 0
      wettercode: 1
      ist_tag: 1
      stand: 1700000000
      tag1_max: 20
      tag1_min: 10
      tag1_niederschlag_mm: 0
      tag1_wettercode: 1
      tag2_max: 22
      tag2_min: 12
      tag2_niederschlag_mm: 1.5
      tag2_wettercode: 2
      tag3_max: 21
      tag3_min: 11
      tag3_niederschlag_mm: 0
      tag3_wettercode: 3
      fehler: ""
  - eingaenge: { abruf: true }
    parameter: { _test_fehler: "Timeout" }
    erwartet: { fehler: "Timeout" }
